<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px 28px; background: var(--off-white); font-family: var(--font-sans); }
  .specimen { display: grid; grid-template-columns: 110px 1fr; column-gap: 18px; row-gap: 8px; align-items: baseline; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); padding-top: 6px; }
  .l-700 { font-weight: 700; font-size: 18px; color: var(--fg-1); }
  .l-600 { font-weight: 600; font-size: 18px; color: var(--fg-1); }
  .l-500 { font-weight: 500; font-size: 18px; color: var(--fg-1); }
  .l-400 { font-weight: 400; font-size: 18px; color: var(--fg-1); }
  .l-300 { font-weight: 300; font-size: 18px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="specimen">
    <span class="lbl">Bold · 700</span>     <span class="l-700">Sessões prontas em minutos.</span>
    <span class="lbl">SemiBold · 600</span> <span class="l-600">Sessões prontas em minutos.</span>
    <span class="lbl">Medium · 500</span>   <span class="l-500">Sessões prontas em minutos.</span>
    <span class="lbl">Regular · 400</span>  <span class="l-400">Sessões prontas em minutos.</span>
    <span class="lbl">Light · 300</span>    <span class="l-300">Sessões prontas em minutos.</span>
  </div>
</body>
</html>
