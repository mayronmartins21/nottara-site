<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--off-white); display: flex; gap: 14px; align-items: stretch; }
  .tile { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 120px; gap: 10px; background: #fff; }
  .tile.dark { background: var(--graphite); border-color: var(--graphite); }
  .tile.amber { background: var(--amber-soft); border-color: transparent; }
  .lab { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-3); font-weight: 700; }
  .tile.dark .lab { color: var(--ink-300); }
  .row { display: flex; align-items: center; gap: 12px; }
  .name-serif { font-family: var(--font-display); font-size: 30px; color: var(--fg-1); letter-spacing: -.01em; }
  .tile.dark .name-serif { color: var(--off-white); }
  .icon-rounded { width: 56px; height: 56px; border-radius: 14px; display: block; }
</style>
</head>
<body>
  <div class="tile">
    <div class="row">
      <img class="icon-rounded" src="../assets/logo-icon-1024.png" alt="Nottara"/>
      <span class="name-serif">Nottara</span>
    </div>
    <span class="lab">Wordmark · light</span>
  </div>
  <div class="tile dark">
    <div class="row">
      <img class="icon-rounded" src="../assets/logo-icon-1024.png" alt="Nottara"/>
      <span class="name-serif">Nottara</span>
    </div>
    <span class="lab">Wordmark · dark</span>
  </div>
  <div class="tile">
    <img src="../assets/logo-icon-1024.png" alt="" width="68" height="68" style="border-radius:16px"/>
    <span class="lab">App icon · 1024</span>
  </div>
  <div class="tile amber">
    <img src="../assets/logo-mark-transparent.png" alt="" width="78" height="78"/>
    <span class="lab">Mark · transparent</span>
  </div>
</body>
</html>
