<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--off-white); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 16px 22px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; font-weight: 600; color: var(--fg-1); }
  input, textarea, select { font: inherit; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border-default); background: #fff; color: var(--fg-1); outline: none; transition: border-color .2s; }
  input:focus, .focused { border-color: var(--amber); border-width: 1.5px; padding: 9.5px 13.5px; box-shadow: 0 0 0 3px rgba(239,159,39,.18); }
  .help { font-size: 12px; color: var(--fg-3); }
  .help.error { color: var(--danger); }
  input::placeholder { color: var(--fg-4); }
</style>
</head>
<body>
  <div class="field">
    <label>Nome do paciente</label>
    <input value="Mariana Silva"/>
    <span class="help">Visível só para você.</span>
  </div>
  <div class="field">
    <label>E-mail profissional</label>
    <input class="focused" value="ana@clinica.com.br"/>
    <span class="help">Foco · 1.5px âmbar</span>
  </div>
  <div class="field">
    <label>CRP</label>
    <input placeholder="06/123456"/>
    <span class="help">Conselho regional de psicologia.</span>
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" value="aaaaaaaaa" style="border-color:var(--danger)"/>
    <span class="help error">Senha precisa ter pelo menos 10 caracteres.</span>
  </div>
</body>
</html>
