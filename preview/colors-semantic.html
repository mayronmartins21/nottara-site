<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--off-white); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pair { background: #fff; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
  .chips { display: flex; height: 70px; }
  .chips .c { flex: 1; }
  .meta { padding: 10px 12px; }
  .name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="pair">
      <div class="chips"><div class="c" style="background:#4F7A55"></div><div class="c" style="background:#E4ECDF"></div></div>
      <div class="meta"><div class="name">Success</div><div class="hex">#4F7A55 · #E4ECDF</div></div>
    </div>
    <div class="pair">
      <div class="chips"><div class="c" style="background:#C7891F"></div><div class="c" style="background:#FBEFD5"></div></div>
      <div class="meta"><div class="name">Warning</div><div class="hex">#C7891F · #FBEFD5</div></div>
    </div>
    <div class="pair">
      <div class="chips"><div class="c" style="background:#B5462E"></div><div class="c" style="background:#F4E1DA"></div></div>
      <div class="meta"><div class="name">Danger</div><div class="hex">#B5462E · #F4E1DA</div></div>
    </div>
    <div class="pair">
      <div class="chips"><div class="c" style="background:#4A6B82"></div><div class="c" style="background:#E0E8EE"></div></div>
      <div class="meta"><div class="name">Info</div><div class="hex">#4A6B82 · #E0E8EE</div></div>
    </div>
  </div>
</body>
</html>
