<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 32px 28px; background: var(--off-white); }
  .word { font-family: var(--font-display); font-size: 84px; line-height: .98; letter-spacing: -.02em; color: var(--graphite); margin: 0 0 14px; }
  .meta { display: flex; gap: 14px; font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
  .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
  <div class="word">Confiança<br/><em style="font-style:italic">clínica</em>.</div>
  <div class="meta">
    <span><span class="dot"></span>DM Serif Display</span>
    <span>Regular · Italic</span>
    <span>−2% tracking</span>
  </div>
</body>
</html>
