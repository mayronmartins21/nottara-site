<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--off-white); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); background: #fff; }
  .chip { height: 64px; }
  .meta { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#F1ECE0"></div><div class="meta"><div class="name">ink-50</div><div class="hex">#F1ECE0</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E8E3D8"></div><div class="meta"><div class="name">ink-100</div><div class="hex">#E8E3D8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#D9D3C4"></div><div class="meta"><div class="name">ink-200</div><div class="hex">#D9D3C4</div></div></div>
    <div class="swatch"><div class="chip" style="background:#BDB7A8"></div><div class="meta"><div class="name">ink-300</div><div class="hex">#BDB7A8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#918D82"></div><div class="meta"><div class="name">ink-400</div><div class="hex">#918D82</div></div></div>
    <div class="swatch"><div class="chip" style="background:#6E6B62"></div><div class="meta"><div class="name">ink-500</div><div class="hex">#6E6B62</div></div></div>
    <div class="swatch"><div class="chip" style="background:#3A3A35"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#3A3A35</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A18"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#1A1A18</div></div></div>
  </div>
</body>
</html>
