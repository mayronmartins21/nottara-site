<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Toast / alerts</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px 22px; background: var(--off-white); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toast { display: grid; grid-template-columns: 28px 1fr; gap: 10px; padding: 12px 14px; border-radius: 10px; background: #fff; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md); align-items: start; }
  .ic { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; }
  .title { font-size: 13px; font-weight: 600; color: var(--fg-1); }
  .body { font-size: 12px; color: var(--fg-2); margin-top: 2px; line-height: 1.5; }
  .success .ic { background: var(--success); }
  .warning .ic { background: var(--warning); }
  .danger .ic { background: var(--danger); }
  .info .ic { background: var(--info); }
</style>
</head>
<body>
  <div class="toast success">
    <div class="ic">✓</div>
    <div><div class="title">Nota salva</div><div class="body">A sessão de Mariana foi sincronizada.</div></div>
  </div>
  <div class="toast warning">
    <div class="ic">!</div>
    <div><div class="title">Revise antes de enviar</div><div class="body">Detectamos termos sem categoria.</div></div>
  </div>
  <div class="toast danger">
    <div class="ic">×</div>
    <div><div class="title">Falha ao gravar</div><div class="body">Verifique a permissão do microfone.</div></div>
  </div>
  <div class="toast info">
    <div class="ic">i</div>
    <div><div class="title">LGPD</div><div class="body">Áudio apagado após transcrição.</div></div>
  </div>
</body>
</html>
