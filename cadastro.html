<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Criar conta — Nottara</title>
  <meta name="description" content="Crie sua conta no Nottara em 3 passos. Validação por CRP. Conformidade LGPD."/>
  <link rel="icon" type="image/png" href="assets/logo-icon-192.png"/>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--off-white);
      color: var(--graphite);
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
    button { font-family: inherit; }

    /* Decorative wave backdrops — seamless infinite drift */
    .wave-layer {
      position: absolute; inset: 0;
      width: 200%; height: 100%;
      will-change: transform;
    }
    .wave-layer-a { animation: wave-drift 14s linear infinite; }
    .wave-layer-b { animation: wave-drift 20s linear infinite reverse; }
    @keyframes wave-drift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-50%, 0, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave-layer-a, .wave-layer-b { animation: none; }
    }

    /* Mobile tweaks */
    @media (max-width: 520px) {
      header > div { padding: 16px 18px !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

  <script type="text/babel" src="site/parts.jsx"></script>
  <script type="text/babel" src="site/auth-modal.jsx"></script>
  <script type="text/babel" src="site/signup.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<SignupFlow/>);
  </script>
</body>
</html>
