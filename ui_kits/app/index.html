<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Nottara — Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 36px 20px 60px; background: #ECE7DA; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
  .stage { display: flex; gap: 36px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .device-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .lab { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #6E6B62; }
  .device { width: 360px; height: 760px; border-radius: 44px; background: #F7F5F0; position: relative; overflow: hidden; box-shadow: 0 30px 60px -20px rgba(0,0,0,.25), 0 0 0 8px #1A1A18, 0 0 0 9px rgba(0,0,0,.4); }
  .island { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 110px; height: 30px; background: #000; border-radius: 20px; z-index: 100; }
  .home { position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; background: rgba(26,26,24,.3); border-radius: 999px; z-index: 100; }
  .screen { position: absolute; inset: 0; padding-top: 38px; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
function Phone({ children, label }) {
  return (
    <div className="device-wrap">
      <div className="device" data-screen-label={label}>
        <div className="island"></div>
        <NTStatusBar/>
        <div className="screen">{children}</div>
        <div className="home"></div>
      </div>
      <span className="lab">{label}</span>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('home');
  const [view, setView] = React.useState('home'); // home, patients, record, note

  const inner = (() => {
    if (view === 'record') return <NTScreenRecord onStop={() => setView('note')}/>;
    if (view === 'note')   return <NTScreenNote onBack={() => setView('patients')}/>;
    if (view === 'patients') return <NTScreenPatients onOpen={() => setView('note')}/>;
    return <NTScreenHome onRecord={() => setView('record')} onOpenPatient={() => setView('note')}/>;
  })();

  return (
    <div className="stage">
      <Phone label="01 Início"><NTScreenHome onRecord={() => {}} onOpenPatient={() => {}}/><NTTabBar active="home" onTab={()=>{}}/></Phone>
      <Phone label="02 Pacientes"><NTScreenPatients onOpen={() => {}}/><NTTabBar active="patients" onTab={()=>{}}/></Phone>
      <Phone label="03 Gravando"><NTScreenRecord onStop={() => {}}/></Phone>
      <Phone label="04 Nota clínica"><NTScreenNote onBack={() => {}}/><NTTabBar active="patients" onTab={()=>{}}/></Phone>
      <Phone label="05 Click-thru">
        {inner}
        {view !== 'record' && <NTTabBar active={tab} onTab={t => { setTab(t); if (t==='record') setView('record'); else if (t==='patients') setView('patients'); else if (t==='home') setView('home'); }}/>}
      </Phone>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
